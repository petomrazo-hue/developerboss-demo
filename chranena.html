<!DOCTYPE html>
<html lang="sk">
<head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Chránená sekcia — Peter Mráz" />
    <meta name="author" content="Mrazosoft" />
    <title>Chránená sekcia — Peter Mráz</title>
    <link href="css/StylyMojhoWebu.css" rel="stylesheet" />

    <script>
        // Okamžitá kontrola pred renderom (rekonštrukcia MemberController auth check)
        if (!sessionStorage.getItem('loggedInUser')) {
            window.location.replace('prihlasenie.html');
        }
    </script>
</head>
<body>

<video class="portfolio" poster="images/melAdidi2.jpeg" playsinline autoplay muted loop>
    <source src="media/video/portfolio.mp4" type="video/mp4">
</video>

<nav class="navbar navbar-default navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <button class="tlacitko-moje" id="toggleLanguageButton">SK/EN</button>
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a href="index.html"><img src="images/melAdidi2.jpeg" alt="melAdidi" /></a>
        </div>
        <div id="navbar" class="collapse navbar-collapse">
            <ul class="nav navbar-nav navbar-right">
                <li><a href="index.html">Domov</a></li>
                <li><a href="vzdelanie.html">Vzdelanie</a></li>
                <li><a href="galeria.html">Fotografie</a></li>
                <li><a href="video.html">Video</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li class="active"><a href="prihlasenie.html">Prihlásenie</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-body">
    <div style="background: rgba(255,255,255,0.92); min-height: 80vh; padding: 60px 0;">
        <div class="container">

            <!-- Rekonštrukcia MemberInfo.cshtml -->
            <div class="member-info">
                <h3>Členská sekcia</h3>
                <hr />

                <p>
                    <i class="fas fa-user glyphicon"></i>
                    Prihlásený používateľ: <strong id="displayUsername"></strong>
                </p>

                <p>Vitajte v chránenej členskej sekcii!</p>
                <p class="medium">Tu by bol exkluzívny obsah dostupný len pre členov.</p>

                <br />
                <!-- Rekonštrukcia Logout linku z MemberInfo.cshtml -->
                <a href="#" id="logoutLink" class="tlacitko-moje">
                    <i class="fas fa-sign-out-alt"></i> Odhlásiť sa
                </a>
            </div>

        </div>
    </div>
</div>

<div class="container">
    <div class="pata">
        <hr />Copyright &copy; 2026 Mrazosoft.sk<br />
        Email: petermraz@mrazosoft.sk
    </div>
</div>

<script src="scripts/document.ready.js"></script>
<script>
    // Zobraz meno prihláseného používateľa (rekonštrukcia @myUser.UserName)
    var user = sessionStorage.getItem('loggedInUser');
    if (user) {
        document.getElementById('displayUsername').textContent = user;
    }

    // Logout — rekonštrukcia MemberController.Logout()
    document.getElementById('logoutLink').addEventListener('click', function(e) {
        e.preventDefault();
        sessionStorage.removeItem('loggedInUser');
        window.location.href = 'prihlasenie.html';
    });

    document.getElementById("toggleLanguageButton").addEventListener("click", function () {
        window.location.href = "protected.html";
    });
</script>
</body>
</html>
