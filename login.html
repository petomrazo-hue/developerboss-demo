<div class="page-body">
    <div style="background: rgba(255,255,255,0.92); min-height: 80vh; padding: 60px 0;">
        <div class="container">

            <div class="login-form">
                <form id="loginForm" class="form-horizontal" role="form">
                    <div class="developerboss-form">
                        <div id="loginError" class="alert alert-danger" style="display:none;">
                            Invalid username or password.
                        </div>
                        <div class="form-item">
                            <label for="Username">Username</label>
                            <input type="text" id="Username" name="Username" class="form-control" placeholder="Your e-mail" />
                            <span class="field-validation-error" id="usernameError" style="display:none;">Username must be entered</span>
                        </div>
                        <div class="form-item">
                            <label for="Password">Password</label>
                            <input type="password" id="Password" name="Password" class="form-control" placeholder="Your password" />
                            <span class="field-validation-error" id="passwordError" style="display:none;">Password must be entered</span>
                        </div>
                        <div class="form-section">
                            <a href="#" onclick="document.getElementById('submitButton').click(); return false;" class="tlacitko-moje">Login</a>
                            <input type="submit" id="submitButton" class="hidden" />
                        </div>
                    </div>
                </form>
                <p style="margin-top:20px; color:#888; font-size:13px;">
                    Username: <strong>peter</strong> &nbsp;|&nbsp; Password: <strong>developerboss</strong>
                </p>
            </div>

        </div>

<script src="scripts/jquery.lazy.min.js"></script>

<script src="scripts/petermraz.js"></script>
<script>
    if (sessionStorage.getItem('loggedInUser')) {
        window.location.href = 'protected.html';
    }

    $('#loginForm').on('submit', function(e) {
        e.preventDefault();
        var u = $('#Username').val().trim();
        var p = $('#Password').val();
        var valid = true;
        if (!u) { $('#usernameError').show(); valid = false; } else { $('#usernameError').hide(); }
        if (!p) { $('#passwordError').show(); valid = false; } else { $('#passwordError').hide(); }
        if (!valid) return;
        if (u === 'peter' && p === 'developerboss') {
            sessionStorage.setItem('loggedInUser', u);
            window.location.href = 'protected.html';
        } else {
            $('#loginError').show();
        }
    });

    document.getElementById("toggleLanguageButton").addEventListener("click", function () {
        window.location.href = "prihlasenie.html";
    });
</script>
