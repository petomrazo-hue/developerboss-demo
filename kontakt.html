    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Kontaktujte Petra Mráza — webový vývojár." />

    <link href="css/StylyMojhoWebu.css" rel="stylesheet" />

            </ul>

<!-- Obsah (rekonštrukcia ContactForm.cshtml — Bootstrap 3 formulár) -->
<div class="page-body">
    <div style="background: rgba(255,255,255,0.92); min-height: 100vh; padding: 40px 0 60px;">
        <div class="container">

            <div class="row">
                <div class="col-md-12">
                    <h1>Kontakt</h1>
                    <hr />
                </div>
            </div>

            <div class="row">
                <!-- Kontaktné info -->
                <div class="col-md-4 contact-items">
                    <p>
                        <i class="fas fa-envelope glyphicon"></i><br />
                        petermraz@mrazosoft.sk
                    </p>
                    <p>
                        <i class="fas fa-phone glyphicon"></i><br />
                        +421 9XX XXX XXX
                    </p>
                    <p>
                        <i class="fas fa-map-marker-alt glyphicon"></i><br />
                        Slovensko
                    </p>
                </div>

                <!-- Kontaktný formulár (Bootstrap 3 form — Modul 6) -->
                <div class="col-md-8">
                    <form class="moj-formular" action="mailto:petermraz@mrazosoft.sk" method="post" enctype="text/plain">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="meno">Meno</label>
                                    <input type="text" class="form-control" id="meno" name="Meno" placeholder="Vaše meno" required />
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="email">E-mail</label>
                                    <input type="email" class="form-control" id="email" name="Email" placeholder="vas@email.sk" required />
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label for="predmet">Predmet</label>
                                    <input type="text" class="form-control" id="predmet" name="Predmet" placeholder="Predmet správy" />
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label for="sprava">Správa</label>
                                    <textarea class="form-control" id="sprava" name="Sprava" rows="5" placeholder="Napíšte vašu správu..." required></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <button type="submit" class="tlacitko-moje">
                                    <i class="fas fa-paper-plane"></i> Odoslať správu
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Pätička -->
<div class="container">
    <div class="pata">
        <hr />
        Copyright &copy; 2026 Mrazosoft.sk
        <br />
        Email: petermraz@mrazosoft.sk
    </div>
</div>

<script>
    document.getElementById("toggleLanguageButton").addEventListener("click", function () {
        window.location.href = "contact.html";
    });
</script>
</body>
</html>
