<script src="scripts/jquery.lazy.min.js"></script>

<script src="scripts/lightgallery.min.js"></script>
<script>
    // Presná rekonštrukcia logiky z Galeria3.cshtml
    var sliderObject = null;
    $(document).ready(function () {
        $('.photo-slider').hide();

        $('.photo-gallery-item-hover').click(function () {
            var slideNum = parseInt($(this).data('idx'));
            $('.gallery-list').hide();
            $('.photo-slider').show();

            if (sliderObject) {
                sliderObject.destroy();
            }

            sliderObject = $('#lightSlider').lightSlider({
                gallery: true,
                item: 1,
                loop: false,
                keyPress: true,
                thumbItem: 9,
                slideMargin: 0,
                enableDrag: false,
                currentPagerPosition: 'left',
                onSliderLoad: function (el) {
                    sliderObject = el;
                    $('.photo-slider-count').html(el.getCurrentSlideCount() + "/" + el.getTotalSlideCount());
                    sliderObject.goToSlide(slideNum);
                },
                onAfterSlide: function (el) {
                    $('.photo-slider-count').html(el.getCurrentSlideCount() + "/" + el.getTotalSlideCount());
                }
            });
            $('html, body').scrollTop(0);
        });

        $('.photo-slider-close').click(function () {
            if (sliderObject) sliderObject.destroy();
            sliderObject = null;
            $('.gallery-list').show();
            $('.photo-slider').hide();
        });
    });

    document.getElementById("toggleLanguageButton").addEventListener("click", function () {
        window.location.href = "gallery.html";
    });
</script>
